<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Business Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #080C14;
    --surface: #0F1824;
    --surface2: #162030;
    --border: #1E2D42;
    --accent: #00C2FF;
    --accent2: #00FFB2;
    --warn: #FFB547;
    --danger: #FF4D6A;
    --text: #E8F4FF;
    --muted: #4A6580;
    --subtle: #2A3F55;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header {
    background: linear-gradient(180deg, #0D1929 0%, #080C14 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #00C2FF22, #00FFB222);
    border: 1px solid #00C2FF44;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); letter-spacing: -0.5px; }
  .logo-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .sync-status { font-family: 'DM Mono', monospace; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  .sync-dot.syncing { background: var(--warn); animation: none; }
  .sync-dot.error { background: var(--danger); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .btn-new {
    background: linear-gradient(135deg, #00C2FF22, #00FFB222);
    border: 1px solid #00C2FF55;
    border-radius: 8px; padding: 8px 16px;
    color: var(--accent); font-weight: 600; font-size: 13px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-new:hover { background: linear-gradient(135deg, #00C2FF33, #00FFB233); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px 20px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
    transition: border-color 0.2s;
  }
  .stat-icon { font-size: 18px; margin-bottom: 6px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Tabs */
  .tabs { display: flex; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 4px; }
  .tab {
    background: none; border: none; padding: 10px 14px;
    color: var(--muted); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Filters */
  .filters { display: flex; gap: 8px; padding: 14px 20px; flex-wrap: wrap; align-items: center; }
  select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; color: var(--text);
    font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .count-badge { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  /* Task List */
  .task-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }
  .task-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    transition: border-color 0.2s, transform 0.1s;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .task-card:hover { border-color: var(--subtle); }
  .task-card.overdue { border-color: #FF4D6A33; }
  .task-top { display: flex; align-items: flex-start; gap: 10px; }
  .task-main { flex: 1; min-width: 0; }
  .task-title { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 4px; }
  .task-title.done { text-decoration: line-through; color: var(--muted); }
  .task-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 4px; font-family: 'DM Mono', monospace;
  }
  .badge-pending { background: #FFB54722; color: var(--warn); }
  .badge-inprogress { background: #00C2FF22; color: var(--accent); }
  .badge-done { background: #00FFB222; color: var(--accent2); }
  .badge-high { color: var(--danger); }
  .badge-medium { color: var(--warn); }
  .badge-low { color: var(--muted); }
  .badge-overdue { color: var(--danger); }
  .task-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .task-meta span { font-size: 11px; color: var(--muted); }
  .task-desc { font-size: 12px; color: #4A6580; margin-bottom: 6px; line-height: 1.5; }
  .task-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; }
  .action-select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 6px; color: var(--text);
    font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .btn-icon {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px; cursor: pointer;
    font-size: 12px; transition: background 0.2s;
  }
  .btn-icon:hover { background: var(--subtle); }
  .btn-delete { border-color: #FF4D6A22; }
  .btn-delete:hover { background: #FF4D6A22; }

  /* Workers Tab */
  .workers-grid { padding: 16px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .worker-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .worker-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; margin-bottom: 10px; }
  .worker-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
  .w-stat { background: var(--bg); border-radius: 8px; padding: 8px; text-align: center; }
  .w-stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
  .w-stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .progress-bar { background: var(--bg); border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.5s; }
  .progress-pct { font-size: 10px; color: var(--muted); text-align: right; margin-top: 3px; font-family: 'DM Mono', monospace; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: #00000099;
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 16px; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; width: 100%; max-width: 460px;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, textarea, select.form-select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select.form-select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; color: var(--muted);
    font-weight: 600; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .btn-submit {
    flex: 2; background: linear-gradient(135deg, #00C2FF33, #00FFB233);
    border: 1px solid var(--accent); border-radius: 8px; padding: 10px;
    color: var(--accent); font-weight: 700; font-size: 13px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-submit:hover { background: linear-gradient(135deg, #00C2FF44, #00FFB244); }

  /* Empty / Loading */
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; z-index: 999;
    animation: toastIn 0.3s ease;
    display: flex; align-items: center; gap: 8px;
  }
  @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  @media (max-width: 480px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    .task-actions { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">TaskFlow</div>
      <div class="logo-sub">Business Task Manager</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText" style="color:var(--muted)">connected</span>
    </div>
    <button class="btn-new" onclick="openModal()">+ New Task</button>
  </div>
</div>

<div class="stats">
  <div class="stat-card" style="border-color:#00C2FF22">
    <div class="stat-icon">📋</div>
    <div class="stat-value" id="statTotal" style="color:var(--accent)">0</div>
    <div class="stat-label">Total Tasks</div>
  </div>
  <div class="stat-card" style="border-color:#FFB54722">
    <div class="stat-icon">⏳</div>
    <div class="stat-value" id="statPending" style="color:var(--warn)">0</div>
    <div class="stat-label">Pending</div>
  </div>
  <div class="stat-card" style="border-color:#00C2FF22">
    <div class="stat-icon">🔄</div>
    <div class="stat-value" id="statProgress" style="color:var(--accent)">0</div>
    <div class="stat-label">In Progress</div>
  </div>
  <div class="stat-card" style="border-color:#00FFB222">
    <div class="stat-icon">✅</div>
    <div class="stat-value" id="statDone" style="color:var(--accent2)">0</div>
    <div class="stat-label">Completed</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('tasks', this)">📋 All Tasks</button>
  <button class="tab" onclick="switchTab('workers', this)">👥 By Worker</button>
</div>

<div id="tasksTab">
  <div class="filters">
    <select id="filterWorker" onchange="renderTasks()">
      <option value="All">All Workers</option>
      <option>Jiyad</option><option>Vicky</option><option>Jaabir</option><option>Anas</option>
      <option>Mubarak</option><option>Noor</option><option>Owais</option><option>Rafiq</option>
      <option>Qamar</option><option>Ahmed</option><option>Gaus</option><option>Mohsin</option>
      <option>Kishor</option><option>Ajaz</option>
    </select>
    <select id="filterStatus" onchange="renderTasks()">
      <option value="All">All Status</option>
      <option value="pending">Pending</option>
      <option value="inprogress">In Progress</option>
      <option value="done">Done</option>
    </select>
    <div class="count-badge" id="taskCount">0 tasks</div>
  </div>
  <div class="task-list" id="taskList">
    <div class="loading">Connecting to cloud...</div>
  </div>
</div>

<div id="workersTab" style="display:none">
  <div class="workers-grid" id="workerGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Task</div>
    <div class="form-group">
      <label>Task Title *</label>
      <input type="text" id="fTitle" placeholder="e.g. Deliver items to Al Ain client">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="fDesc" placeholder="Task details, notes, address..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Assign To</label>
        <select class="form-select" id="fWorker">
          <option>Jiyad</option><option>Vicky</option><option>Jaabir</option><option>Anas</option>
          <option>Mubarak</option><option>Noor</option><option>Owais</option><option>Rafiq</option>
          <option>Qamar</option><option>Ahmed</option><option>Gaus</option><option>Mohsin</option>
          <option>Kishor</option><option>Ajaz</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select class="form-select" id="fPriority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">⚪ Low</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select class="form-select" id="fStatus">
          <option value="pending">Pending</option>
          <option value="inprogress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="fDue">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="submitTask()" id="submitBtn">Create Task</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mbqpfvcirvsoempwnsew.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icXBmdmNpcnZzb2VtcHduc2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NjkyNjgsImV4cCI6MjA5MjE0NTI2OH0.MDPdRAQ-LNzMchnRgUOfhNspJL9Xq5swztMOffKcJUU';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let tasks = [];
let editingId = null;
let activeTab = 'tasks';

// Init
async function init() {
  await loadTasks();
  subscribeToChanges();
}

async function loadTasks() {
  setSyncStatus('syncing');
  try {
    const { data, error } = await db.from('tasks').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    tasks = data || [];
    renderTasks();
    renderWorkers();
    updateStats();
    setSyncStatus('connected');
  } catch (e) {
    setSyncStatus('error');
    document.getElementById('taskList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>Could not connect. Check your Supabase table is named "tasks"</div></div>`;
  }
}

function subscribeToChanges() {
  db.channel('tasks-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => {
      loadTasks();
    })
    .subscribe();
}

function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot' + (state !== 'connected' ? ' ' + state : '');
  txt.textContent = state === 'connected' ? 'live sync' : state === 'syncing' ? 'syncing...' : 'error';
  txt.style.color = state === 'connected' ? 'var(--accent2)' : state === 'syncing' ? 'var(--warn)' : 'var(--danger)';
}

function updateStats() {
  document.getElementById('statTotal').textContent = tasks.length;
  document.getElementById('statPending').textContent = tasks.filter(t => t.status === 'pending').length;
  document.getElementById('statProgress').textContent = tasks.filter(t => t.status === 'inprogress').length;
  document.getElementById('statDone').textContent = tasks.filter(t => t.status === 'done').length;
}

function renderTasks() {
  const fw = document.getElementById('filterWorker').value;
  const fs = document.getElementById('filterStatus').value;
  const filtered = tasks.filter(t => (fw === 'All' || t.worker === fw) && (fs === 'All' || t.status === fs));
  document.getElementById('taskCount').textContent = filtered.length + ' tasks';

  if (filtered.length === 0) {
    document.getElementById('taskList').innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div>No tasks found</div></div>`;
    return;
  }

  document.getElementById('taskList').innerHTML = filtered.map(task => {
    const isOverdue = task.due_date && new Date(task.due_date) < new Date() && task.status !== 'done';
    const statusBadge = { pending: 'badge-pending', inprogress: 'badge-inprogress', done: 'badge-done' }[task.status];
    const statusLabel = { pending: 'Pending', inprogress: 'In Progress', done: 'Done' }[task.status];
    const priorityColor = { high: 'badge-high', medium: 'badge-medium', low: 'badge-low' }[task.priority];
    return `
      <div class="task-card ${isOverdue ? 'overdue' : ''}">
        <div class="task-top">
          <div class="task-main">
            <div class="task-badges">
              <span class="badge ${statusBadge}">${statusLabel}</span>
              <span class="badge ${priorityColor}">● ${task.priority}</span>
              ${isOverdue ? '<span class="badge badge-overdue">⚠ OVERDUE</span>' : ''}
            </div>
            <div class="task-title ${task.status === 'done' ? 'done' : ''}">${task.title}</div>
            ${task.description ? `<div class="task-desc">${task.description}</div>` : ''}
            <div class="task-meta">
              <span>👤 ${task.worker}</span>
              ${task.due_date ? `<span style="color:${isOverdue ? 'var(--danger)' : 'var(--muted)'}">📅 ${new Date(task.due_date).toLocaleDateString()}</span>` : ''}
              <span style="font-family:'DM Mono',monospace">${new Date(task.created_at).toLocaleDateString()}</span>
            </div>
          </div>
          <div class="task-actions">
            <select class="action-select" onchange="updateStatus('${task.id}', this.value)">
              <option value="pending" ${task.status==='pending'?'selected':''}>Pending</option>
              <option value="inprogress" ${task.status==='inprogress'?'selected':''}>In Progress</option>
              <option value="done" ${task.status==='done'?'selected':''}>Done</option>
            </select>
            <button class="btn-icon" onclick="editTask('${task.id}')">✏️</button>
            <button class="btn-icon btn-delete" onclick="deleteTask('${task.id}')">🗑</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderWorkers() {
  const workers = ['Jiyad','Vicky','Jaabir','Anas','Mubarak','Noor','Owais','Rafiq','Qamar','Ahmed','Gaus','Mohsin','Kishor','Ajaz'];
  const html = workers.map(w => {
    const wtasks = tasks.filter(t => t.worker === w);
    if (wtasks.length === 0) return '';
    const done = wtasks.filter(t => t.status === 'done').length;
    const pending = wtasks.filter(t => t.status === 'pending').length;
    const pct = wtasks.length > 0 ? Math.round((done / wtasks.length) * 100) : 0;
    return `
      <div class="worker-card">
        <div class="worker-name">👤 ${w}</div>
        <div class="worker-stats">
          <div class="w-stat"><div class="w-stat-val" style="color:var(--accent)">${wtasks.length}</div><div class="w-stat-lbl">Total</div></div>
          <div class="w-stat"><div class="w-stat-val" style="color:var(--warn)">${pending}</div><div class="w-stat-lbl">Pending</div></div>
          <div class="w-stat"><div class="w-stat-val" style="color:var(--accent2)">${done}</div><div class="w-stat-lbl">Done</div></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-pct">${pct}% complete</div>
      </div>`;
  }).join('');
  document.getElementById('workerGrid').innerHTML = html || '<div class="empty"><div class="empty-icon">👥</div><div>No tasks assigned yet</div></div>';
}

async function updateStatus(id, status) {
  setSyncStatus('syncing');
  await db.from('tasks').update({ status }).eq('id', id);
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  setSyncStatus('syncing');
  await db.from('tasks').delete().eq('id', id);
}

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'New Task';
  document.getElementById('submitBtn').textContent = 'Create Task';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fWorker').value = 'Jiyad';
  document.getElementById('fPriority').value = 'medium';
  document.getElementById('fStatus').value = 'pending';
  document.getElementById('fDue').value = '';
  document.getElementById('modalOverlay').style.display = 'flex';
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('submitBtn').textContent = 'Save Changes';
  document.getElementById('fTitle').value = task.title;
  document.getElementById('fDesc').value = task.description || '';
  document.getElementById('fWorker').value = task.worker;
  document.getElementById('fPriority').value = task.priority;
  document.getElementById('fStatus').value = task.status;
  document.getElementById('fDue').value = task.due_date || '';
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

async function submitTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').style.borderColor = 'var(--danger)'; return; }
  document.getElementById('fTitle').style.borderColor = 'var(--border)';

  const payload = {
    title,
    description: document.getElementById('fDesc').value.trim(),
    worker: document.getElementById('fWorker').value,
    priority: document.getElementById('fPriority').value,
    status: document.getElementById('fStatus').value,
    due_date: document.getElementById('fDue').value || null,
  };

  setSyncStatus('syncing');
  closeModal();

  if (editingId) {
    await db.from('tasks').update(payload).eq('id', editingId);
  } else {
    await db.from('tasks').insert([payload]);
  }
  showToast(editingId ? '✏️ Task updated' : '✅ Task created');
}

function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tasksTab').style.display = tab === 'tasks' ? 'block' : 'none';
  document.getElementById('workersTab').style.display = tab === 'workers' ? 'block' : 'none';
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

init();
</script>
</body>
</html>
