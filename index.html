<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Business Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #080C14; --surface: #0F1824; --surface2: #162030;
    --border: #1E2D42; --accent: #00C2FF; --accent2: #00FFB2;
    --warn: #FFB547; --danger: #FF4D6A; --text: #E8F4FF;
    --muted: #4A6580; --subtle: #2A3F55;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(ellipse at 50% 0%, #0D2040 0%, #080C14 70%); }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 400px; animation: modalIn 0.3s ease; }
  .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; justify-content: center; }
  .login-icon { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #00C2FF22, #00FFB222); border: 1px solid #00C2FF44; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .login-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; }
  .login-label { font-size: 12px; color: var(--muted); margin-bottom: 12px; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
  .name-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .name-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; font-family: 'DM Sans', sans-serif; color: var(--text); }
  .name-btn:hover { border-color: var(--accent); color: var(--accent); background: #00C2FF11; }
  .name-btn.manager { border-color: #FFB54744; }
  .name-btn.manager:hover { border-color: var(--warn); color: var(--warn); background: #FFB54711; }
  .manager-note { font-size: 10px; color: var(--muted); text-align: center; margin-top: 10px; font-family: 'DM Mono', monospace; }
  .manager-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--warn); margin-right: 4px; vertical-align: middle; }

  .header { background: linear-gradient(180deg, #0D1929 0%, #080C14 100%); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, #00C2FF22, #00FFB222); border: 1px solid #00C2FF44; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; }
  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .user-badge { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 600; }
  .user-role { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .btn-logout { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-new { background: linear-gradient(135deg, #00C2FF22, #00FFB222); border: 1px solid #00C2FF55; border-radius: 8px; padding: 7px 14px; color: var(--accent); font-weight: 600; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; display: inline-block; }
  .sync-dot.syncing { background: var(--warn); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .readonly-notice { background: #00C2FF11; border: 1px solid #00C2FF33; border-radius: 8px; padding: 8px 14px; margin: 12px 20px 0; font-size: 12px; color: var(--accent); text-align: center; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 14px 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
  .stat-icon { font-size: 16px; margin-bottom: 4px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .tabs { display: flex; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 4px; }
  .tab { background: none; border: none; padding: 10px 14px; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .filters { display: flex; gap: 8px; padding: 12px 20px; flex-wrap: wrap; align-items: center; }
  select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .count-badge { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .task-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }
  .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; transition: border-color 0.2s; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .task-card:hover { border-color: var(--subtle); }
  .task-top { display: flex; align-items: flex-start; gap: 10px; }
  .task-main { flex: 1; min-width: 0; }
  .task-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .task-title.done { text-decoration: line-through; color: var(--muted); }
  .task-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; font-family: 'DM Mono', monospace; }
  .badge-pending { background: #FFB54722; color: var(--warn); }
  .badge-inprogress { background: #00C2FF22; color: var(--accent); }
  .badge-done { background: #00FFB222; color: var(--accent2); }
  .badge-high { color: var(--danger); }
  .badge-medium { color: var(--warn); }
  .badge-low { color: var(--muted); }
  .task-desc { font-size: 12px; color: var(--muted); margin-bottom: 6px; line-height: 1.5; }
  .task-meta { display: flex; gap: 10px; flex-wrap: wrap; }
  .task-meta span { font-size: 11px; color: var(--muted); }
  .assignees { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
  .assignee-tag { font-size: 10px; background: #00C2FF11; border: 1px solid #00C2FF33; color: var(--accent); padding: 2px 7px; border-radius: 20px; }
  .task-actions { display: flex; gap: 5px; flex-shrink: 0; align-items: flex-start; flex-wrap: wrap; justify-content: flex-end; }
  .action-select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; color: var(--text); font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-icon { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 12px; }
  .btn-delete { border-color: #FF4D6A22; }
  .btn-delete:hover { background: #FF4D6A22; }

  .workers-grid { padding: 14px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
  .worker-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .worker-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .manager-badge { font-size: 9px; background: #FFB54722; color: var(--warn); padding: 2px 6px; border-radius: 4px; font-family: 'DM Mono', monospace; }
  .worker-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
  .w-stat { background: var(--bg); border-radius: 8px; padding: 7px; text-align: center; }
  .w-stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; }
  .w-stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .progress-bar { background: var(--bg); border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.5s; }
  .progress-pct { font-size: 10px; color: var(--muted); text-align: right; margin-top: 3px; font-family: 'DM Mono', monospace; }

  .modal-overlay { position: fixed; inset: 0; background: #00000099; display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; width: 100%; max-width: 480px; animation: modalIn 0.2s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; margin-bottom: 18px; }
  .form-group { margin-bottom: 13px; }
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, textarea, select.form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; }
  input:focus, textarea:focus, select.form-select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 65px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-cancel { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--muted); font-weight: 600; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-submit { flex: 2; background: linear-gradient(135deg, #00C2FF33, #00FFB233); border: 1px solid var(--accent); border-radius: 8px; padding: 10px; color: var(--accent); font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  .assignee-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .assignee-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 4px; text-align: center; cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text); transition: all 0.15s; }
  .assignee-btn.selected { background: #00C2FF22; border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 15px; font-size: 13px; z-index: 999; animation: toastIn 0.3s ease; }
  @keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* PIN SCREEN */
  .pin-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(ellipse at 50% 0%, #1a1000 0%, #080C14 70%); }
  .pin-box { background: var(--surface); border: 1px solid #FFB54744; border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 340px; text-align: center; animation: modalIn 0.3s ease; }
  .pin-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 4px; }
  .pin-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 24px; font-family: 'DM Mono', monospace; }
  .pin-name { color: var(--warn); }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); transition: all 0.2s; }
  .pin-dot.filled { background: var(--warn); border-color: var(--warn); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .pin-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; font-size: 18px; font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif; color: var(--text); transition: all 0.15s; }
  .pin-btn:hover { background: #FFB54722; border-color: var(--warn); color: var(--warn); }
  .pin-btn:active { transform: scale(0.95); }
  .pin-clear { background: none; border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; width: 100%; }
  .pin-error { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 18px; font-family: 'DM Mono', monospace; }
  .pin-back { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; margin-top: 12px; font-family: 'DM Sans', sans-serif; text-decoration: underline; }


    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    .name-grid { grid-template-columns: repeat(2, 1fr); }
    .assignee-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-icon">⚡</div>
      <div>
        <div class="login-title">TaskFlow</div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">Business Task Manager</div>
      </div>
    </div>
    <div class="login-label">Who are you?</div>
    <div class="name-grid" id="nameGrid"></div>
    <div class="manager-note"><span class="manager-dot"></span>Gold border = Manager (PIN required)</div>
  </div>
</div>

<!-- PIN SCREEN -->
<div class="pin-screen" id="pinScreen" style="display:none">
  <div class="pin-box">
    <div class="pin-title">Manager Access</div>
    <div class="pin-subtitle">Welcome, <span class="pin-name" id="pinName">—</span></div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn" onclick="pinPress('back')" style="font-size:14px">⌫</button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn" onclick="pinPress('clear')" style="font-size:11px;color:var(--muted)">CLR</button>
    </div>
    <div class="pin-error" id="pinError"></div>
    <button class="pin-back" onclick="backToLogin()">← Back</button>
  </div>
</div>

<div id="mainApp" style="display:none">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">TaskFlow</div>
    </div>
    <div class="header-right">
      <span class="sync-dot" id="syncDot"></span>
      <div class="user-badge">
        <span id="headerName">—</span>
        <span class="user-role" id="headerRole">—</span>
      </div>
      <button class="btn-logout" onclick="logout()">↩</button>
      <button class="btn-new" id="btnNew" onclick="openModal()" style="display:none">+ New Task</button>
    </div>
  </div>

  <div id="readonlyNotice" style="display:none" class="readonly-notice">👀 View only — you can see your assigned tasks</div>

  <div class="stats">
    <div class="stat-card" style="border-color:#00C2FF22"><div class="stat-icon">📋</div><div class="stat-value" id="statTotal" style="color:var(--accent)">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card" style="border-color:#FFB54722"><div class="stat-icon">⏳</div><div class="stat-value" id="statPending" style="color:var(--warn)">0</div><div class="stat-label">Pending</div></div>
    <div class="stat-card" style="border-color:#00C2FF22"><div class="stat-icon">🔄</div><div class="stat-value" id="statProgress" style="color:var(--accent)">0</div><div class="stat-label">Progress</div></div>
    <div class="stat-card" style="border-color:#00FFB222"><div class="stat-icon">✅</div><div class="stat-value" id="statDone" style="color:var(--accent2)">0</div><div class="stat-label">Done</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('tasks', this)">📋 Tasks</button>
    <button class="tab" id="workersTabBtn" onclick="switchTab('workers', this)" style="display:none">👥 Workers</button>
  </div>

  <div id="tasksTab">
    <div class="filters">
      <select id="filterStatus" onchange="renderTasks()">
        <option value="All">All Status</option>
        <option value="pending">Pending</option>
        <option value="inprogress">In Progress</option>
        <option value="done">Done</option>
      </select>
      <select id="filterWorker" onchange="renderTasks()" style="display:none">
        <option value="All">All Workers</option>
        <option>Jiyad</option><option>Vicky</option><option>Jaabir</option><option>Anas</option>
        <option>Mubarak</option><option>Noor</option><option>Owais</option><option>Rafiq</option>
        <option>Qamar</option><option>Ahmed</option><option>Gaus</option><option>Mohsin</option>
        <option>Kishor</option><option>Ajaz</option>
      </select>
      <div class="count-badge" id="taskCount">0 tasks</div>
    </div>
    <div class="task-list" id="taskList"><div class="loading">Connecting...</div></div>
  </div>

  <div id="workersTab" style="display:none">
    <div class="workers-grid" id="workerGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Task</div>
    <div class="form-group">
      <label>Task Title *</label>
      <input type="text" id="fTitle" placeholder="e.g. Deliver items to client">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="fDesc" placeholder="Details, location, notes..."></textarea>
    </div>
    <div class="form-group">
      <label>Assign To (tap to select, multiple allowed)</label>
      <div class="assignee-grid" id="assigneeGrid"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select class="form-select" id="fPriority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">⚪ Low</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select class="form-select" id="fStatus">
          <option value="pending">Pending</option>
          <option value="inprogress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="submitTask()" id="submitBtn">Create Task</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eepumhbkvmbaeopnqiko.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcHVtaGJrdm1iYWVvcG5xaWtvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NjE1NjIsImV4cCI6MjA5MjEzNzU2Mn0.1QLLY_WJ3T4dQTRi2mcyR1Sxi3G-bPIKglJPt0mfzds';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const ALL_WORKERS = ['Jiyad','Vicky','Jaabir','Anas','Mubarak','Noor','Owais','Rafiq','Qamar','Ahmed','Gaus','Mohsin','Kishor','Ajaz'];
const MANAGERS = ['Mubarak','Owais','Anas','Vicky'];

let tasks = [], currentUser = null, isManager = false, editingId = null, selectedAssignees = [];

const MANAGER_PIN = '5436';
let pinBuffer = '';
let pendingManagerLogin = null;

function buildLogin() {
  document.getElementById('nameGrid').innerHTML = ALL_WORKERS.map(n =>
    `<button class="name-btn ${MANAGERS.includes(n)?'manager':''}" onclick="selectName('${n}')">${n}${MANAGERS.includes(n)?' ⭐':''}</button>`
  ).join('');
}

function selectName(name) {
  if (MANAGERS.includes(name)) {
    pendingManagerLogin = name;
    pinBuffer = '';
    updatePinDots();
    document.getElementById('pinName').textContent = name;
    document.getElementById('pinError').textContent = '';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('pinScreen').style.display = 'flex';
  } else {
    login(name);
  }
}

function pinPress(val) {
  if (val === 'back') { pinBuffer = pinBuffer.slice(0, -1); }
  else if (val === 'clear') { pinBuffer = ''; }
  else if (pinBuffer.length < 4) { pinBuffer += val; }
  updatePinDots();
  if (pinBuffer.length === 4) {
    setTimeout(() => {
      if (pinBuffer === MANAGER_PIN) {
        document.getElementById('pinScreen').style.display = 'none';
        login(pendingManagerLogin);
      } else {
        document.getElementById('pinError').textContent = '✗ Incorrect PIN. Try again.';
        pinBuffer = '';
        updatePinDots();
      }
    }, 200);
  }
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('pd' + i).className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  }
}

function backToLogin() {
  pinBuffer = '';
  pendingManagerLogin = null;
  document.getElementById('pinScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function login(name) {
  currentUser = name;
  isManager = MANAGERS.includes(name);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('headerName').textContent = name;
  document.getElementById('headerRole').textContent = isManager ? 'Manager' : 'Employee';
  if (isManager) {
    document.getElementById('btnNew').style.display = 'block';
    document.getElementById('filterWorker').style.display = 'block';
    document.getElementById('workersTabBtn').style.display = 'block';
  } else {
    document.getElementById('readonlyNotice').style.display = 'block';
  }
  init();
}

function logout() {
  currentUser = null; isManager = false; tasks = [];
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function init() {
  await loadTasks();
  setInterval(loadTasks, 4000);
}

async function loadTasks() {
  setSyncStatus('syncing');
  try {
    const { data, error } = await db.from('tasks').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    tasks = data || [];
    renderTasks();
    if (isManager) renderWorkers();
    updateStats();
    setSyncStatus('connected');
  } catch(e) {
    setSyncStatus('error');
    document.getElementById('taskList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>Connection error</div></div>`;
  }
}

function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : '');
  dot.style.background = state === 'connected' ? 'var(--accent2)' : state === 'syncing' ? 'var(--warn)' : 'var(--danger)';
}

function updateStats() {
  const v = isManager ? tasks : tasks.filter(t => (t.workers||[]).includes(currentUser));
  document.getElementById('statTotal').textContent = v.length;
  document.getElementById('statPending').textContent = v.filter(t=>t.status==='pending').length;
  document.getElementById('statProgress').textContent = v.filter(t=>t.status==='inprogress').length;
  document.getElementById('statDone').textContent = v.filter(t=>t.status==='done').length;
}

function renderTasks() {
  const fs = document.getElementById('filterStatus').value;
  const fw = isManager ? document.getElementById('filterWorker').value : null;
  let filtered = isManager ? [...tasks] : tasks.filter(t => (t.workers||[]).includes(currentUser));
  if (fs !== 'All') filtered = filtered.filter(t => t.status === fs);
  if (fw && fw !== 'All') filtered = filtered.filter(t => (t.workers||[]).includes(fw));
  document.getElementById('taskCount').textContent = filtered.length + ' tasks';
  if (filtered.length === 0) {
    document.getElementById('taskList').innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div>${isManager?'No tasks found':'No tasks assigned to you yet'}</div></div>`;
    return;
  }
  document.getElementById('taskList').innerHTML = filtered.map(task => {
    const sb = {pending:'badge-pending',inprogress:'badge-inprogress',done:'badge-done'}[task.status];
    const sl = {pending:'Pending',inprogress:'In Progress',done:'Done'}[task.status];
    const pc = {high:'badge-high',medium:'badge-medium',low:'badge-low'}[task.priority];
    const assignees = (task.workers||[]).map(w=>`<span class="assignee-tag">👤 ${w}</span>`).join('');
    const actions = isManager ? `
      <select class="action-select" onchange="updateStatus('${task.id}',this.value)">
        <option value="pending" ${task.status==='pending'?'selected':''}>Pending</option>
        <option value="inprogress" ${task.status==='inprogress'?'selected':''}>In Progress</option>
        <option value="done" ${task.status==='done'?'selected':''}>Done</option>
      </select>
      <button class="btn-icon" onclick="editTask('${task.id}')">✏️</button>
      <button class="btn-icon btn-delete" onclick="deleteTask('${task.id}')">🗑</button>` : '';
    return `<div class="task-card">
      <div class="task-top">
        <div class="task-main">
          <div class="task-badges"><span class="badge ${sb}">${sl}</span><span class="badge ${pc}">● ${task.priority}</span></div>
          <div class="task-title ${task.status==='done'?'done':''}">${task.title}</div>
          ${task.description?`<div class="task-desc">${task.description}</div>`:''}
          ${assignees?`<div class="assignees">${assignees}</div>`:''}
          <div class="task-meta"><span style="font-family:'DM Mono',monospace">${new Date(task.created_at).toLocaleDateString()}</span></div>
        </div>
        <div class="task-actions">${actions}</div>
      </div></div>`;
  }).join('');
}

function renderWorkers() {
  const html = ALL_WORKERS.map(w => {
    const wt = tasks.filter(t=>(t.workers||[]).includes(w));
    if (!wt.length) return '';
    const done = wt.filter(t=>t.status==='done').length;
    const pending = wt.filter(t=>t.status==='pending').length;
    const pct = Math.round((done/wt.length)*100);
    return `<div class="worker-card">
      <div class="worker-name">👤 ${w} ${MANAGERS.includes(w)?'<span class="manager-badge">MGR</span>':''}</div>
      <div class="worker-stats">
        <div class="w-stat"><div class="w-stat-val" style="color:var(--accent)">${wt.length}</div><div class="w-stat-lbl">Total</div></div>
        <div class="w-stat"><div class="w-stat-val" style="color:var(--warn)">${pending}</div><div class="w-stat-lbl">Pending</div></div>
        <div class="w-stat"><div class="w-stat-val" style="color:var(--accent2)">${done}</div><div class="w-stat-lbl">Done</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-pct">${pct}% complete</div>
    </div>`;
  }).join('');
  document.getElementById('workerGrid').innerHTML = html || '<div class="empty"><div class="empty-icon">👥</div><div>No tasks assigned yet</div></div>';
}

async function updateStatus(id, status) {
  setSyncStatus('syncing');
  await db.from('tasks').update({status}).eq('id',id);
  await loadTasks();
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  setSyncStatus('syncing');
  await db.from('tasks').delete().eq('id',id);
  await loadTasks();
}

function buildAssigneeGrid(selected=[]) {
  selectedAssignees = [...selected];
  document.getElementById('assigneeGrid').innerHTML = ALL_WORKERS.map(w =>
    `<button class="assignee-btn ${selected.includes(w)?'selected':''}" onclick="toggleAssignee('${w}',this)">${w}</button>`
  ).join('');
}

function toggleAssignee(name, btn) {
  if (selectedAssignees.includes(name)) { selectedAssignees = selectedAssignees.filter(n=>n!==name); btn.classList.remove('selected'); }
  else { selectedAssignees.push(name); btn.classList.add('selected'); }
}

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'New Task';
  document.getElementById('submitBtn').textContent = 'Create Task';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fPriority').value = 'medium';
  document.getElementById('fStatus').value = 'pending';
  buildAssigneeGrid([]);
  document.getElementById('modalOverlay').style.display = 'flex';
}

function editTask(id) {
  const task = tasks.find(t=>t.id===id);
  if (!task) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('submitBtn').textContent = 'Save Changes';
  document.getElementById('fTitle').value = task.title;
  document.getElementById('fDesc').value = task.description||'';
  document.getElementById('fPriority').value = task.priority;
  document.getElementById('fStatus').value = task.status;
  buildAssigneeGrid(task.workers||[]);
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

async function submitTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').style.borderColor='var(--danger)'; return; }
  if (!selectedAssignees.length) { showToast('⚠️ Select at least one person'); return; }
  document.getElementById('fTitle').style.borderColor = 'var(--border)';
  const payload = { title, description: document.getElementById('fDesc').value.trim(), workers: selectedAssignees, priority: document.getElementById('fPriority').value, status: document.getElementById('fStatus').value };
  setSyncStatus('syncing');
  closeModal();
  if (editingId) await db.from('tasks').update(payload).eq('id',editingId);
  else await db.from('tasks').insert([payload]);
  await loadTasks();
  showToast(editingId ? '✏️ Task updated' : '✅ Task created');
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tasksTab').style.display = tab==='tasks'?'block':'none';
  document.getElementById('workersTab').style.display = tab==='workers'?'block':'none';
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

buildLogin();
</script>
</body>
</html>
